show_nav_item:
  default: true
  type: bool
  description:
    en: "Show Media Library link in the top navigation"
    nl: "Toon Media Library link in de topnavigatie"

nav_item_text:
  default: ""
  type: string
  description:
    en: "Optional custom label for the nav item (empty = use translation)"
    nl: "Optionele eigen label voor de navigatie (leeg = vertaling)"

audio_placeholder:
  default: ""
  type: upload
  description:
    en: "Placeholder image used for audio items when no thumbnail exists (recommended 16:9, e.g. 1600x900)."
    nl: "Placeholder afbeelding voor audio items zonder thumbnail (aanrader 16:9, bijv. 1600x900)."

# HLS playback (milestone 1)
hls_js_url:
  default: "https://cdn.jsdelivr.net/npm/hls.js@1.5.14/dist/hls.min.js"
  type: string
  description:
    en: "URL to hls.js (used for HLS playback in Chrome/Firefox). Leave empty to disable hls.js loading."
    nl: "URL naar hls.js (nodig voor HLS in Chrome/Firefox). Laat leeg om hls.js niet te laden."

hls_js_allowed_url_prefixes:
  default: "https://cdn.jsdelivr.net/npm/hls.js@|https://unpkg.com/hls.js@"
  type: list
  description:
    en: "Allowed URL prefixes for loading hls.js. Keep this restricted to trusted CDN prefixes. Default allows jsDelivr and unpkg. Leave empty to block external hls.js loading."
    nl: "Toegestane URL-prefixes voor het laden van hls.js. Beperk dit tot vertrouwde CDN-prefixes. Standaard zijn jsDelivr en unpkg toegestaan. Laat leeg om extern laden van hls.js te blokkeren."

hls_js_fallback_urls:
  default: ""
  type: list
  description:
    en: "Optional fallback hls.js URLs to try when the primary hls_js_url cannot be loaded. Each URL must also match hls_js_allowed_url_prefixes."
    nl: "Optionele fallback hls.js URLs om te proberen wanneer de primaire hls_js_url niet geladen kan worden. Elke URL moet ook overeenkomen met hls_js_allowed_url_prefixes."

hls_prefer_native:
  default: true
  type: bool
  description:
    en: "Prefer native HLS playback where available (Safari/iOS)."
    nl: "Gebruik native HLS waar beschikbaar (Safari/iOS)."

hls_debug:
  default: false
  type: bool
  description:
    en: "Enable hls.js debug logging (console)."
    nl: "Zet hls.js debug logging aan (console)."

# HLS browser buffer tuning. This applies only to hls.js browsers such as Firefox/Chrome/Edge.
# Safari/iOS native HLS decides its own buffering behavior.
hls_conservative_buffering_enabled:
  default: true
  type: bool
  description:
    en: "Limit hls.js forward/back buffer for protected HLS playback. Helps prevent Firefox from fetching the entire video after playback starts."
    nl: "Beperk de hls.js vooruit/terug buffer voor beschermde HLS playback. Helpt voorkomen dat Firefox de hele video ophaalt nadat playback start."

hls_stop_load_on_pause:
  default: true
  type: bool
  description:
    en: "Call hls.js stopLoad() when the preview player is paused, and resume loading on play. Does not affect native Safari/iOS HLS."
    nl: "Roep hls.js stopLoad() aan wanneer de preview player pauzeert, en hervat laden bij play. Heeft geen effect op native Safari/iOS HLS."

hls_max_buffer_length_seconds:
  default: 24
  type: integer
  min: 6
  max: 120
  description:
    en: "Target forward buffer length for hls.js, in seconds. Lower values reduce prefetching but may increase buffering on slow networks."
    nl: "Doel voor vooruitbuffer van hls.js, in seconden. Lagere waarden verminderen prefetching maar kunnen meer buffering geven op trage netwerken."

hls_max_max_buffer_length_seconds:
  default: 60
  type: integer
  min: 12
  max: 300
  description:
    en: "Harder forward buffer cap for hls.js, in seconds. Keep below the full length of typical short protected videos."
    nl: "Hardere vooruitbuffer limiet voor hls.js, in seconden. Houd dit onder de volledige lengte van typische korte beschermde video's."

hls_max_buffer_size_mb:
  default: 30
  type: integer
  min: 4
  max: 200
  description:
    en: "Maximum hls.js buffer size in MB. This prevents low-bitrate videos from being fully prefetched because they fit in a small byte budget."
    nl: "Maximale hls.js buffer in MB. Dit voorkomt dat low-bitrate video's volledig worden geprefetched omdat ze in een klein bytebudget passen."

hls_back_buffer_length_seconds:
  default: 30
  type: integer
  min: 0
  max: 300
  description:
    en: "How many seconds hls.js may keep behind the current playhead. Lower values reduce retained buffered media after seeking/playback."
    nl: "Hoeveel seconden hls.js achter de huidige afspeelpositie mag bewaren. Lagere waarden beperken behouden gebufferde media na seek/playback."
